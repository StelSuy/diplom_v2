# =============================================================================
#  TimeTracker — Nginx virtual host
#  HTTP → HTTPS redirect + HTTPS with WebSocket support
#
#  SSL: place your certs at docker/nginx/ssl/
#    fullchain.pem  — certificate + chain
#    privkey.pem    — private key
#
#  For Let's Encrypt (Certbot):
#    certbot certonly --standalone -d yourdomain.com
#    then copy/symlink certs to docker/nginx/ssl/
# =============================================================================

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream timetracker_api {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # ACME challenge for Certbot (keep before redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen       443 ssl http2;
    listen  [::]:443 ssl http2;
    server_name  _;            # ← replace with your domain in production

    # ── SSL ───────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Client settings ───────────────────────────────────────────────────
    client_max_body_size  10m;

    # ── /health — без rate limit ──────────────────────────────────────────
    location = /health {
        proxy_pass         http://timetracker_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass             http://timetracker_api;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── API login — strict rate limit ─────────────────────────────────────
    location = /api/login {
        limit_req  zone=login  burst=5  nodelay;
        limit_req_status 429;

        proxy_pass         http://timetracker_api;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API ───────────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api  burst=20  nodelay;
        limit_req_status 429;

        proxy_pass         http://timetracker_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # CORS preflight cache
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ── Admin panel (served by FastAPI /admin static mount) ───────────────
    location /admin {
        proxy_pass         http://timetracker_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets aggressively
        proxy_cache_valid  200 1d;
        expires            1d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Root ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://timetracker_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
